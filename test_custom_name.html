<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Name Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test-result { margin: 10px 0; padding: 10px; border-radius: 5px; }
        .pass { background-color: #d4edda; color: #155724; }
        .fail { background-color: #f8d7da; color: #721c24; }
        .summary { margin-top: 20px; padding: 15px; background-color: #e2e3e5; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>Custom Name Functionality Test</h1>
    <div id="test-results"></div>

    <script>
        // Load the LocalStorageService and TimeUtils from app.js
        class LocalStorageService {
            static save(key, data) {
                try {
                    const serialized = JSON.stringify(data);
                    localStorage.setItem(key, serialized);
                    return true;
                } catch (error) {
                    console.error(`LocalStorage save error for key "${key}":`, error);
                    return false;
                }
            }

            static load(key) {
                try {
                    const serialized = localStorage.getItem(key);
                    if (serialized === null) {
                        return null;
                    }
                    return JSON.parse(serialized);
                } catch (error) {
                    console.error(`LocalStorage load error for key "${key}":`, error);
                    return null;
                }
            }
        }

        class TimeUtils {
            static getCurrentTime() {
                return new Date();
            }

            static getTimeBasedGreeting(date) {
                const hour = date.getHours();
                if (hour >= 5 && hour < 12) return "Good Morning";
                if (hour >= 12 && hour < 17) return "Good Afternoon";
                if (hour >= 17 && hour < 21) return "Good Evening";
                return "Good Night";
            }
        }

        const STORAGE_KEYS = {
            CUSTOM_NAME: 'productivity-dashboard-custom-name'
        };

        // Test functions
        function runTests() {
            const results = [];
            
            // Clear storage before tests
            localStorage.clear();
            
            // Test 1: Save and load custom name (Requirement 2.2)
            const testName = "John Doe";
            LocalStorageService.save(STORAGE_KEYS.CUSTOM_NAME, testName);
            const loadedName = LocalStorageService.load(STORAGE_KEYS.CUSTOM_NAME);
            results.push({
                name: "Save and Load Custom Name (Req 2.2)",
                pass: loadedName === testName,
                details: `Expected: ${testName}, Got: ${loadedName}`
            });

            // Test 2: Personalized greeting generation (Requirement 2.3)
            const mockWidget = {
                customName: testName,
                getPersonalizedGreeting(date) {
                    const baseGreeting = TimeUtils.getTimeBasedGreeting(date);
                    if (this.customName) {
                        return `${baseGreeting}, ${this.customName}!`;
                    } else {
                        return baseGreeting;
                    }
                }
            };

            const testDate = new Date('2024-01-15T10:00:00'); // Morning
            const personalizedGreeting = mockWidget.getPersonalizedGreeting(testDate);
            const expectedGreeting = "Good Morning, John Doe!";
            
            results.push({
                name: "Personalized Greeting Generation (Req 2.3)",
                pass: personalizedGreeting === expectedGreeting,
                details: `Expected: ${expectedGreeting}, Got: ${personalizedGreeting}`
            });

            // Test 3: Default greeting without custom name (Requirement 2.4)
            mockWidget.customName = null;
            const afternoonDate = new Date('2024-01-15T15:00:00'); // Afternoon
            const defaultGreeting = mockWidget.getPersonalizedGreeting(afternoonDate);
            const expectedDefault = "Good Afternoon";
            results.push({
                name: "Default Greeting Without Custom Name (Req 2.4)",
                pass: defaultGreeting === expectedDefault,
                details: `Expected: ${expectedDefault}, Got: ${defaultGreeting}`
            });

            // Test 4: Input sanitization (Requirement 2.1)
            function sanitizeInput(input) {
                const div = document.createElement('div');
                div.textContent = input;
                return div.innerHTML;
            }

            const maliciousInput = "<script>alert('xss')</script>John";
            const sanitized = sanitizeInput(maliciousInput);
            results.push({
                name: "Input Sanitization (Req 2.1)",
                pass: !sanitized.includes('<script>') && sanitized.includes('John'),
                details: `Input: ${maliciousInput}, Sanitized: ${sanitized}`
            });

            // Test 5: Custom name persistence across sessions (Requirement 2.5, 2.6)
            const persistentName = "Alice Smith";
            LocalStorageService.save(STORAGE_KEYS.CUSTOM_NAME, persistentName);
            
            // Simulate new session by creating new widget
            const newSessionName = LocalStorageService.load(STORAGE_KEYS.CUSTOM_NAME);
            results.push({
                name: "Custom Name Persistence Across Sessions (Req 2.5, 2.6)",
                pass: newSessionName === persistentName,
                details: `Expected: ${persistentName}, Got: ${newSessionName}`
            });

            // Test 6: Time-based greeting variations
            const timeTests = [
                { time: '2024-01-15T08:00:00', expected: 'Good Morning' },
                { time: '2024-01-15T14:00:00', expected: 'Good Afternoon' },
                { time: '2024-01-15T19:00:00', expected: 'Good Evening' },
                { time: '2024-01-15T23:00:00', expected: 'Good Night' }
            ];

            let timeTestsPassed = 0;
            timeTests.forEach(test => {
                const date = new Date(test.time);
                const greeting = TimeUtils.getTimeBasedGreeting(date);
                if (greeting === test.expected) {
                    timeTestsPassed++;
                }
            });

            results.push({
                name: "Time-based Greeting Variations",
                pass: timeTestsPassed === timeTests.length,
                details: `${timeTestsPassed}/${timeTests.length} time-based greetings correct`
            });

            // Test 7: Input validation scenarios
            const validationTests = [
                { input: '', shouldPass: false, reason: 'Empty input' },
                { input: '   ', shouldPass: false, reason: 'Whitespace only' },
                { input: 'A'.repeat(51), shouldPass: false, reason: 'Too long (>50 chars)' },
                { input: 'Valid Name', shouldPass: true, reason: 'Valid input' },
                { input: 'A'.repeat(50), shouldPass: true, reason: 'Max length (50 chars)' }
            ];

            let validationPassed = 0;
            validationTests.forEach(test => {
                const trimmed = test.input.trim();
                const isValid = trimmed.length > 0 && trimmed.length <= 50;
                if (isValid === test.shouldPass) {
                    validationPassed++;
                }
            });

            results.push({
                name: "Input Validation Rules (Req 2.1)",
                pass: validationPassed === validationTests.length,
                details: `${validationPassed}/${validationTests.length} validation scenarios correct`
            });

            // Test 8: Storage key consistency
            const storageKey = 'productivity-dashboard-custom-name';
            LocalStorageService.save(storageKey, 'Test Value');
            const directAccess = localStorage.getItem(storageKey);
            results.push({
                name: "Storage Key Consistency",
                pass: directAccess === '"Test Value"',
                details: `Storage key '${storageKey}' works correctly`
            });

            displayResults(results);
        }

        function displayResults(results) {
            const container = document.getElementById('test-results');
            results.forEach(result => {
                const div = document.createElement('div');
                div.className = `test-result ${result.pass ? 'pass' : 'fail'}`;
                div.innerHTML = `
                    <strong>${result.name}:</strong> ${result.pass ? 'PASS ✓' : 'FAIL ✗'}<br>
                    <small>${result.details}</small>
                `;
                container.appendChild(div);
            });

            const passed = results.filter(r => r.pass).length;
            const total = results.length;
            const summary = document.createElement('div');
            summary.className = 'summary';
            summary.innerHTML = `
                <h3>Test Summary</h3>
                <p><strong>${passed}/${total} tests passed</strong></p>
                ${passed === total ? 
                    '<p style="color: #155724;">🎉 All tests passed! Custom name functionality is working correctly.</p>' : 
                    '<p style="color: #721c24;">❌ Some tests failed. Please review the implementation.</p>'
                }
                <h4>Requirements Coverage:</h4>
                <ul>
                    <li>Requirement 2.1 (Input functionality): Covered by Input Sanitization and Validation tests</li>
                    <li>Requirement 2.2 (Save to local storage): Covered by Save and Load test</li>
                    <li>Requirement 2.3 (Display custom name): Covered by Personalized Greeting test</li>
                    <li>Requirement 2.4 (Default greeting): Covered by Default Greeting test</li>
                    <li>Requirement 2.5 (Load on startup): Covered by Persistence test</li>
                    <li>Requirement 2.6 (Persist across sessions): Covered by Persistence test</li>
                </ul>
            `;
            container.appendChild(summary);
        }

        // Run tests when page loads
        document.addEventListener('DOMContentLoaded', runTests);
    </script>
</body>
</html>
