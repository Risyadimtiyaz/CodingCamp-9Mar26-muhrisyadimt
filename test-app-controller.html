<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Application Controller</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test-result { margin: 10px 0; padding: 10px; border-radius: 5px; }
        .pass { background-color: #d4edda; color: #155724; }
        .fail { background-color: #f8d7da; color: #721c24; }
        .widget { margin: 20px 0; padding: 15px; border: 1px solid #ddd; }
    </style>
</head>
<body>
    <h1>Application Controller Test</h1>
    <div id="test-results"></div>
    
    <!-- Mock widget containers -->
    <div id="greeting-widget" class="widget">
        <div id="time-display"></div>
        <div id="date-display"></div>
        <div id="greeting-message"></div>
    </div>
    
    <div id="timer-widget" class="widget">
        <div id="timer-display"></div>
        <button id="timer-start">Start</button>
        <button id="timer-stop">Stop</button>
        <button id="timer-reset">Reset</button>
        <div id="timer-status"></div>
    </div>
    
    <div id="task-widget" class="widget">
        <input type="text" id="task-input">
        <button id="add-task-btn">Add</button>
        <div id="task-list"></div>
    </div>
    
    <div id="links-widget" class="widget">
        <input type="url" id="link-url-input">
        <input type="text" id="link-name-input">
        <button id="add-link-btn">Add</button>
        <div id="links-list"></div>
    </div>

    <script src="js/app.js"></script>
    <script>
        // Test script to verify initialization
        window.addEventListener('load', () => {
            setTimeout(() => {
                const results = document.getElementById('test-results');
                const tests = [];
                
                // Test 1: Check if greeting widget is initialized
                const timeDisplay = document.getElementById('time-display');
                tests.push({
                    name: 'Greeting Widget Initialized',
                    pass: timeDisplay && timeDisplay.textContent !== ''
                });
                
                // Test 2: Check if timer widget is initialized
                const timerDisplay = document.getElementById('timer-display');
                tests.push({
                    name: 'Focus Timer Initialized',
                    pass: timerDisplay && timerDisplay.textContent === '25:00'
                });
                
                // Test 3: Check if task manager is initialized
                const taskList = document.getElementById('task-list');
                tests.push({
                    name: 'Task Manager Initialized',
                    pass: taskList && taskList.innerHTML !== ''
                });
                
                // Test 4: Check if quick links manager is initialized
                const linksList = document.getElementById('links-list');
                tests.push({
                    name: 'Quick Links Manager Initialized',
                    pass: linksList && linksList.innerHTML !== ''
                });
                
                // Test 5: Check console for initialization messages
                tests.push({
                    name: 'No Console Errors',
                    pass: true // Manual check required
                });
                
                // Display results
                tests.forEach(test => {
                    const div = document.createElement('div');
                    div.className = `test-result ${test.pass ? 'pass' : 'fail'}`;
                    div.textContent = `${test.pass ? '✓' : '✗'} ${test.name}`;
                    results.appendChild(div);
                });
                
                console.log('Test Results:', tests);
            }, 1000);
        });
    </script>
</body>
</html>
